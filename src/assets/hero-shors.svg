<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#120a2a"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="50%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="200" rx="400" ry="170" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Period-finding visualization — QFT output spikes -->
  <!-- Axes -->
  <line x1="80" y1="290" x2="820" y2="290" stroke="#475569" stroke-width="1.5"/>
  <line x1="80" y1="290" x2="80"  y2="60"  stroke="#475569" stroke-width="1.5"/>
  <text x="450" y="330" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">measurement outcome k</text>
  <text x="40"  y="175" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8" transform="rotate(-90 40 175)">P(k)</text>
  <!-- QFT output spikes at 0, N/4, N/2, 3N/4 -->
  <!-- Spike at 0 -->
  <rect x="80"  y="100" width="28" height="190" fill="#7c3aed" opacity="0.85" rx="2"/>
  <!-- Noise floor -->
  <rect x="120" y="278" width="28" height="12" fill="#4c1d95" opacity="0.5" rx="1"/>
  <rect x="158" y="274" width="28" height="16" fill="#4c1d95" opacity="0.5" rx="1"/>
  <rect x="196" y="276" width="28" height="14" fill="#4c1d95" opacity="0.5" rx="1"/>
  <rect x="234" y="272" width="28" height="18" fill="#4c1d95" opacity="0.5" rx="1"/>
  <!-- Spike at N/4 -->
  <rect x="265" y="100" width="28" height="190" fill="#7c3aed" opacity="0.85" rx="2"/>
  <!-- More noise -->
  <rect x="305" y="276" width="28" height="14" fill="#4c1d95" opacity="0.5" rx="1"/>
  <rect x="343" y="272" width="28" height="18" fill="#4c1d95" opacity="0.5" rx="1"/>
  <rect x="381" y="278" width="28" height="12" fill="#4c1d95" opacity="0.5" rx="1"/>
  <rect x="419" y="274" width="28" height="16" fill="#4c1d95" opacity="0.5" rx="1"/>
  <!-- Spike at N/2 -->
  <rect x="453" y="100" width="28" height="190" fill="#7c3aed" opacity="0.85" rx="2"/>
  <!-- Noise -->
  <rect x="493" y="275" width="28" height="15" fill="#4c1d95" opacity="0.5" rx="1"/>
  <rect x="531" y="272" width="28" height="18" fill="#4c1d95" opacity="0.5" rx="1"/>
  <rect x="569" y="277" width="28" height="13" fill="#4c1d95" opacity="0.5" rx="1"/>
  <!-- Spike at 3N/4 -->
  <rect x="640" y="100" width="28" height="190" fill="#7c3aed" opacity="0.85" rx="2"/>
  <!-- Noise -->
  <rect x="680" y="275" width="28" height="15" fill="#4c1d95" opacity="0.4" rx="1"/>
  <rect x="718" y="278" width="28" height="12" fill="#4c1d95" opacity="0.4" rx="1"/>
  <rect x="756" y="272" width="28" height="18" fill="#4c1d95" opacity="0.4" rx="1"/>
  <rect x="784" y="276" width="28" height="14" fill="#4c1d95" opacity="0.4" rx="1"/>
  <!-- Period labels -->
  <line x1="94" y1="80" x2="279" y2="80" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.7"/>
  <line x1="94"  y1="76" x2="94"  y2="84" stroke="#a78bfa" stroke-width="1.5"/>
  <line x1="279" y1="76" x2="279" y2="84" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="186" y="74" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa" font-weight="700">2ⁿ/r</text>
  <!-- Key equation -->
  <text x="450" y="50" text-anchor="middle" font-family="monospace" font-size="14" fill="#c4b5fd" font-weight="700">7ˣ mod 15 — period r = 4</text>
  <text x="450" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#c4b5fd" opacity="0.45" letter-spacing="0.15em">SHOR'S ALGORITHM</text>
</svg>
