<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#071510"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#059669" stop-opacity="0.26"/><stop offset="100%" stop-color="#059669" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="13"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="197" rx="420" ry="175" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Lattice grid (LWE — points in high-dimensional space) -->
  <g opacity="0.5">
    <!-- Lattice dots in a skewed grid -->
    <g fill="#059669">
      <circle cx="140" cy="90"  r="3"/><circle cx="210" cy="90"  r="3"/><circle cx="280" cy="90"  r="3"/><circle cx="350" cy="90"  r="3"/>
      <circle cx="120" cy="150" r="3"/><circle cx="190" cy="150" r="3"/><circle cx="260" cy="150" r="3"/><circle cx="330" cy="150" r="3"/>
      <circle cx="100" cy="210" r="3"/><circle cx="170" cy="210" r="3"/><circle cx="240" cy="210" r="3"/><circle cx="310" cy="210" r="3"/>
      <circle cx="80"  cy="270" r="3"/><circle cx="150" cy="270" r="3"/><circle cx="220" cy="270" r="3"/><circle cx="290" cy="270" r="3"/>
    </g>
    <!-- Lattice basis vectors -->
    <line x1="170" y1="210" x2="240" y2="210" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
    <line x1="170" y1="210" x2="150" y2="270" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
    <!-- Grid connecting lines -->
    <g stroke="#059669" stroke-width="0.5" opacity="0.3">
      <line x1="140" y1="90" x2="80" y2="270"/><line x1="210" y1="90" x2="150" y2="270"/>
      <line x1="280" y1="90" x2="220" y2="270"/><line x1="350" y1="90" x2="290" y2="270"/>
      <line x1="140" y1="90" x2="350" y2="90"/><line x1="120" y1="150" x2="330" y2="150"/>
      <line x1="100" y1="210" x2="310" y2="210"/><line x1="80" y1="270" x2="290" y2="270"/>
    </g>
  </g>
  <!-- Target vector (the hard problem) -->
  <circle cx="205" cy="185" r="6" fill="#f59e0b"/>
  <line x1="170" y1="210" x2="205" y2="185" stroke="#f59e0b" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="222" y="180" font-family="monospace" font-size="8.5" fill="#fbbf24">secret s</text>
  <text x="215" y="305" text-anchor="middle" font-family="monospace" font-size="9" fill="#6ee7b7" opacity="0.8">lattice: As + e = b</text>
  <!-- Right side: the standards -->
  <rect x="440" y="70" width="410" height="255" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <text x="645" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#6ee7b7" font-weight="700" letter-spacing="0.05em">NIST PQC STANDARDS (2024)</text>
  <!-- ML-KEM -->
  <rect x="465" y="115" width="360" height="42" rx="4" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="482" y="133" font-family="monospace" font-size="11" fill="#34d399" font-weight="700">ML-KEM</text>
  <text x="482" y="149" font-family="monospace" font-size="8.5" fill="#6ee7b7">FIPS 203 — key encapsulation (Kyber)</text>
  <!-- ML-DSA -->
  <rect x="465" y="163" width="360" height="42" rx="4" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="482" y="181" font-family="monospace" font-size="11" fill="#34d399" font-weight="700">ML-DSA</text>
  <text x="482" y="197" font-family="monospace" font-size="8.5" fill="#6ee7b7">FIPS 204 — signatures (Dilithium)</text>
  <!-- SLH-DSA -->
  <rect x="465" y="211" width="360" height="42" rx="4" fill="#052e16" stroke="#059669" stroke-width="1.5"/>
  <text x="482" y="229" font-family="monospace" font-size="11" fill="#34d399" font-weight="700">SLH-DSA</text>
  <text x="482" y="245" font-family="monospace" font-size="8.5" fill="#6ee7b7">FIPS 205 — hash-based sigs (SPHINCS+)</text>
  <!-- FN-DSA -->
  <rect x="465" y="259" width="360" height="42" rx="4" fill="#0f2818" stroke="#047857" stroke-width="1.5" opacity="0.8"/>
  <text x="482" y="277" font-family="monospace" font-size="11" fill="#34d399" font-weight="700">FN-DSA</text>
  <text x="482" y="293" font-family="monospace" font-size="8.5" fill="#6ee7b7">FIPS 206 (draft) — compact sigs (FALCON)</text>
  <text x="450" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#6ee7b7" opacity="0.45" letter-spacing="0.15em">POST-QUANTUM CRYPTOGRAPHY</text>
</svg>
