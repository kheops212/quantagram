<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#0a0f1e"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#6d28d9" stop-opacity="0.3"/><stop offset="100%" stop-color="#0284c7" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="10"/></filter>
    <filter id="gbl2"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="197" rx="380" ry="170" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Silicon chip background -->
  <rect x="120" y="70" width="660" height="254" rx="6" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <!-- Waveguide network - a Mach-Zehnder tree -->
  <!-- Input -->
  <line x1="120" y1="197" x2="220" y2="197" stroke="#38bdf8" stroke-width="3" opacity="0.9"/>
  <!-- First beam splitter -->
  <rect x="215" y="183" width="28" height="28" rx="4" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <!-- Split to upper and lower -->
  <line x1="243" y1="190" x2="350" y2="140" stroke="#38bdf8" stroke-width="2.5" opacity="0.85"/>
  <line x1="243" y1="204" x2="350" y2="254" stroke="#818cf8" stroke-width="2.5" opacity="0.85"/>
  <!-- Phase shifters -->
  <rect x="355" y="127" width="40" height="26" rx="3" fill="#92400e" stroke="#d97706" stroke-width="1" opacity="0.8"/>
  <text x="375" y="144" text-anchor="middle" font-family="monospace" font-size="8" fill="#fde68a">φ</text>
  <!-- Second beam splitters -->
  <rect x="395" y="127" width="28" height="28" rx="4" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="395" y="241" width="28" height="28" rx="4" fill="#1e3a5f" stroke="#818cf8" stroke-width="1.5"/>
  <!-- Four outputs -->
  <line x1="423" y1="134" x2="540" y2="110" stroke="#38bdf8" stroke-width="2" opacity="0.8"/>
  <line x1="423" y1="148" x2="540" y2="165" stroke="#38bdf8" stroke-width="2" opacity="0.8"/>
  <line x1="423" y1="248" x2="540" y2="230" stroke="#818cf8" stroke-width="2" opacity="0.8"/>
  <line x1="423" y1="262" x2="540" y2="284" stroke="#818cf8" stroke-width="2" opacity="0.8"/>
  <!-- Detectors -->
  <rect x="540" y="96" width="36" height="28" rx="3" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="558" y="114" text-anchor="middle" font-family="monospace" font-size="8" fill="#c4b5fd">D</text>
  <rect x="540" y="152" width="36" height="28" rx="3" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="558" y="170" text-anchor="middle" font-family="monospace" font-size="8" fill="#c4b5fd">D</text>
  <rect x="540" y="216" width="36" height="28" rx="3" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="558" y="234" text-anchor="middle" font-family="monospace" font-size="8" fill="#c4b5fd">D</text>
  <rect x="540" y="270" width="36" height="28" rx="3" fill="#4c1d95" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="558" y="288" text-anchor="middle" font-family="monospace" font-size="8" fill="#c4b5fd">D</text>
  <!-- Grating coupler -->
  <rect x="610" y="110" width="70" height="40" rx="3" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="645" y="135" text-anchor="middle" font-family="monospace" font-size="8" fill="#86efac">fibre</text>
  <line x1="645" y1="110" x2="645" y2="75" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" opacity="0.7"/>
  <!-- Photon label on input -->
  <circle cx="165" cy="197" r="5" fill="#fde68a" filter="url(#gbl2)"/>
  <text x="165" y="185" text-anchor="middle" font-family="monospace" font-size="9" fill="#fde68a" opacity="0.8">γ</text>
  <text x="450" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a5b4fc" opacity="0.5" letter-spacing="0.15em">PHOTONIC QUBITS</text>
</svg>
