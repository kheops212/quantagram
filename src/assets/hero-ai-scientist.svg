<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#1a0808"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#dc2626" stop-opacity="0.2"/><stop offset="100%" stop-color="#dc2626" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="13"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="197" rx="430" ry="180" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Protein folding structure (left) — helix + sheet -->
  <g opacity="0.9">
    <!-- Alpha helix coil -->
    <path d="M 130,110 Q 160,90 150,130 Q 140,170 175,150 Q 205,130 190,175 Q 178,215 210,195 Q 240,175 228,220"
          fill="none" stroke="#dc2626" stroke-width="4" stroke-linecap="round" opacity="0.8"/>
    <!-- Residue nodes -->
    <circle cx="130" cy="110" r="5" fill="#fca5a5"/>
    <circle cx="150" cy="130" r="5" fill="#fca5a5"/>
    <circle cx="175" cy="150" r="5" fill="#fca5a5"/>
    <circle cx="190" cy="175" r="5" fill="#fca5a5"/>
    <circle cx="210" cy="195" r="5" fill="#fca5a5"/>
    <circle cx="228" cy="220" r="5" fill="#fca5a5"/>
  </g>
  <text x="180" y="255" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#fca5a5">protein folding</text>
  <!-- Neural net / AI core (center) -->
  <g>
    <circle cx="450" cy="140" r="10" fill="#f59e0b"/>
    <circle cx="450" cy="197" r="10" fill="#f59e0b"/>
    <circle cx="450" cy="254" r="10" fill="#f59e0b"/>
    <circle cx="520" cy="168" r="10" fill="#fbbf24"/>
    <circle cx="520" cy="226" r="10" fill="#fbbf24"/>
    <circle cx="385" cy="168" r="10" fill="#fbbf24"/>
    <circle cx="385" cy="226" r="10" fill="#fbbf24"/>
    <g stroke="#f59e0b" stroke-width="1" opacity="0.4">
      <line x1="385" y1="168" x2="450" y2="140"/><line x1="385" y1="168" x2="450" y2="197"/>
      <line x1="385" y1="226" x2="450" y2="197"/><line x1="385" y1="226" x2="450" y2="254"/>
      <line x1="450" y1="140" x2="520" y2="168"/><line x1="450" y1="197" x2="520" y2="168"/>
      <line x1="450" y1="197" x2="520" y2="226"/><line x1="450" y1="254" x2="520" y2="226"/>
    </g>
  </g>
  <text x="450" y="300" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#fbbf24">AI model</text>
  <!-- Crystal lattice (right) — GNoME materials -->
  <g opacity="0.85" stroke="#dc2626" stroke-width="1.5" fill="none">
    <polygon points="650,150 710,130 760,160 700,180" fill="#7f1d1d" fill-opacity="0.3"/>
    <polygon points="650,150 700,180 700,240 650,210" fill="#991b1b" fill-opacity="0.25"/>
    <polygon points="700,180 760,160 760,220 700,240" fill="#dc2626" fill-opacity="0.2"/>
  </g>
  <!-- Lattice atoms -->
  <g fill="#fca5a5">
    <circle cx="650" cy="150" r="5"/><circle cx="710" cy="130" r="5"/><circle cx="760" cy="160" r="5"/>
    <circle cx="700" cy="180" r="5"/><circle cx="650" cy="210" r="5"/><circle cx="700" cy="240" r="5"/><circle cx="760" cy="220" r="5"/>
  </g>
  <text x="705" y="270" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#fca5a5">new materials</text>
  <!-- Arrows from AI to discoveries -->
  <line x1="360" y1="197" x2="245" y2="180" stroke="#f59e0b" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>
  <line x1="545" y1="197" x2="640" y2="185" stroke="#f59e0b" stroke-width="1.5" opacity="0.6" stroke-dasharray="4,3"/>
  <!-- Header -->
  <text x="450" y="70" text-anchor="middle" font-family="monospace" font-size="11" fill="#fbbf24">AlphaFold · GNoME · FunSearch</text>
  <text x="450" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#fca5a5" opacity="0.5" letter-spacing="0.12em">WHEN AI BECOMES THE SCIENTIST</text>
</svg>
