<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#120a2a"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.28"/><stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="197" rx="420" ry="180" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Left: Quantum circuit -->
  <text x="185" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd" opacity="0.7">QUANTUM CIRCUIT</text>
  <line x1="60"  y1="100" x2="310" y2="100" stroke="#475569" stroke-width="1.5"/>
  <line x1="60"  y1="150" x2="310" y2="150" stroke="#475569" stroke-width="1.5"/>
  <line x1="60"  y1="200" x2="310" y2="200" stroke="#475569" stroke-width="1.5"/>
  <line x1="60"  y1="250" x2="310" y2="250" stroke="#475569" stroke-width="1.5"/>
  <!-- H gates -->
  <rect x="70"  y="88"  width="28" height="24" rx="2" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="70"  y="138" width="28" height="24" rx="2" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="70"  y="188" width="28" height="24" rx="2" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <rect x="70"  y="238" width="28" height="24" rx="2" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="84" y="105" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8">H</text>
  <text x="84" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8">H</text>
  <text x="84" y="205" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8">H</text>
  <text x="84" y="255" text-anchor="middle" font-family="monospace" font-size="9" fill="#38bdf8">H</text>
  <!-- Parametrised gates -->
  <rect x="140" y="88"  width="45" height="24" rx="2" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="140" y="138" width="45" height="24" rx="2" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="140" y="188" width="45" height="24" rx="2" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <rect x="140" y="238" width="45" height="24" rx="2" fill="#312e81" stroke="#818cf8" stroke-width="1.5"/>
  <text x="162" y="104" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc">Ry(θ)</text>
  <text x="162" y="154" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc">Ry(θ)</text>
  <text x="162" y="204" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc">Ry(θ)</text>
  <text x="162" y="254" text-anchor="middle" font-family="monospace" font-size="8" fill="#a5b4fc">Ry(θ)</text>
  <!-- CNOT -->
  <circle cx="255" cy="100" r="5" fill="#818cf8"/>
  <line x1="255" y1="105" x2="255" y2="145" stroke="#818cf8" stroke-width="1.5"/>
  <circle cx="255" cy="150" r="10" fill="none" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="245" y1="150" x2="265" y2="150" stroke="#818cf8" stroke-width="1.5"/>
  <line x1="255" y1="140" x2="255" y2="160" stroke="#818cf8" stroke-width="1.5"/>
  <!-- Arrow in center -->
  <rect x="330" y="165" width="240" height="64" rx="8" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="190" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#a78bfa" font-weight="700">Quantum ML</text>
  <text x="450" y="210" text-anchor="middle" font-family="monospace" font-size="10" fill="#7c3aed">⟨ψ(θ)|O|ψ(θ)⟩ → loss</text>
  <text x="450" y="225" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d28d9">classical optimizer → θ*</text>
  <!-- Right: output / predictions -->
  <text x="720" y="65" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac" opacity="0.7">CLASSIFICATION</text>
  <rect x="630" y="85"  width="180" height="40" rx="3" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="630" y="140" width="180" height="40" rx="3" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <rect x="630" y="195" width="180" height="40" rx="3" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="720" y="110" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">Class A: 87%</text>
  <text x="720" y="165" text-anchor="middle" font-family="monospace" font-size="10" fill="#86efac">Class B: 11%</text>
  <text x="720" y="220" text-anchor="middle" font-family="monospace" font-size="10" fill="#4ade80">Class C: 2%</text>
  <text x="450" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#c4b5fd" opacity="0.45" letter-spacing="0.15em">QUANTUM MACHINE LEARNING</text>
</svg>
