<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#1a0808"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#dc2626" stop-opacity="0.2"/><stop offset="100%" stop-color="#dc2626" stop-opacity="0"/></radialGradient>
    <radialGradient id="nd" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fca5a5"/><stop offset="100%" stop-color="#dc2626"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="13"/></filter>
    <filter id="sp"><feGaussianBlur stdDeviation="2"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="197" rx="430" ry="180" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Network of quantum nodes connected by entanglement links -->
  <!-- Links (drawn first) -->
  <g stroke="#dc2626" stroke-width="1.5" opacity="0.4" stroke-dasharray="6,4">
    <line x1="150" y1="120" x2="380" y2="90"/>
    <line x1="380" y1="90"  x2="620" y2="140"/>
    <line x1="150" y1="120" x2="270" y2="260"/>
    <line x1="270" y1="260" x2="500" y2="290"/>
    <line x1="500" y1="290" x2="620" y2="140"/>
    <line x1="380" y1="90"  x2="500" y2="290"/>
    <line x1="620" y1="140" x2="770" y2="240"/>
    <line x1="500" y1="290" x2="770" y2="240"/>
  </g>
  <!-- Entangled pair pulses traveling on one link (highlighted) -->
  <g stroke="#f59e0b" stroke-width="2" opacity="0.85">
    <line x1="380" y1="90" x2="620" y2="140"/>
  </g>
  <circle cx="460" cy="107" r="5" fill="#fde68a" filter="url(#sp)"/>
  <circle cx="540" cy="123" r="5" fill="#fde68a" filter="url(#sp)"/>
  <!-- Nodes (quantum repeaters / end nodes) -->
  <circle cx="150" cy="120" r="20" fill="url(#nd)"/>
  <circle cx="380" cy="90"  r="24" fill="url(#nd)"/>
  <circle cx="620" cy="140" r="24" fill="url(#nd)"/>
  <circle cx="270" cy="260" r="20" fill="url(#nd)"/>
  <circle cx="500" cy="290" r="20" fill="url(#nd)"/>
  <circle cx="770" cy="240" r="20" fill="url(#nd)"/>
  <!-- Node inner rings (quantum memory) -->
  <circle cx="380" cy="90"  r="12" fill="#1a0808" stroke="#fca5a5" stroke-width="1.5"/>
  <circle cx="620" cy="140" r="12" fill="#1a0808" stroke="#fca5a5" stroke-width="1.5"/>
  <!-- Labels -->
  <text x="380" y="58" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#fca5a5">repeater</text>
  <text x="620" y="108" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#fca5a5">repeater</text>
  <text x="150" y="155" text-anchor="middle" font-family="monospace" font-size="8" fill="#fca5a5">node</text>
  <text x="770" y="275" text-anchor="middle" font-family="monospace" font-size="8" fill="#fca5a5">node</text>
  <!-- Entanglement label -->
  <text x="500" y="80" text-anchor="middle" font-family="monospace" font-size="9" fill="#fbbf24" opacity="0.9">entanglement swap</text>
  <!-- Caption box -->
  <rect x="300" y="330" width="300" height="30" rx="4" fill="#0f172a" stroke="#7f1d1d" stroke-width="1"/>
  <text x="450" y="350" text-anchor="middle" font-family="monospace" font-size="9" fill="#fca5a5">entanglement-distributed communication</text>
  <text x="450" y="378" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#fca5a5" opacity="0.5" letter-spacing="0.15em">THE QUANTUM INTERNET</text>
</svg>
