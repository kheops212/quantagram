<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#0c1a2e"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#0284c7" stop-opacity="0.4"/><stop offset="100%" stop-color="#0284c7" stop-opacity="0"/></radialGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="197" rx="340" ry="200" fill="url(#glow)" filter="url(#blur)"/>
  <!-- Dilution fridge stages — concentric rectangles -->
  <rect x="120" y="47" width="660" height="300" rx="6" fill="none" stroke="#1d4ed8" stroke-width="1.5" opacity="0.25"/>
  <rect x="168" y="80" width="564" height="234" rx="5" fill="none" stroke="#0284c7" stroke-width="1.5" opacity="0.35"/>
  <rect x="216" y="113" width="468" height="168" rx="4" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.45"/>
  <rect x="264" y="146" width="372" height="102" rx="3" fill="none" stroke="#7dd3fc" stroke-width="1.5" opacity="0.55"/>
  <!-- Inner cold plate -->
  <rect x="330" y="168" width="240" height="58" rx="4" fill="#0284c7" fill-opacity="0.15" stroke="#bae6fd" stroke-width="2"/>
  <!-- Chip at center -->
  <rect x="400" y="180" width="100" height="34" rx="3" fill="#0c4a6e" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="450" y="202" text-anchor="middle" font-family="monospace" font-size="10" fill="#7dd3fc" font-weight="700">PROCESSOR</text>
  <!-- Stage labels -->
  <text x="140" y="42" font-family="monospace" font-size="9" fill="#0284c7" opacity="0.6">300 K</text>
  <text x="188" y="76" font-family="monospace" font-size="9" fill="#0284c7" opacity="0.7">4 K</text>
  <text x="236" y="109" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.7">800 mK</text>
  <text x="278" y="142" font-family="monospace" font-size="9" fill="#7dd3fc" opacity="0.8">100 mK</text>
  <text x="338" y="164" font-family="monospace" font-size="9" fill="#bae6fd" opacity="0.9">15 mK</text>
  <!-- Wiring cables from top -->
  <line x1="370" y1="47" x2="370" y2="168" stroke="#0284c7" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="410" y1="47" x2="410" y2="168" stroke="#0284c7" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="450" y1="47" x2="450" y2="168" stroke="#0284c7" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="490" y1="47" x2="490" y2="168" stroke="#0284c7" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <line x1="530" y1="47" x2="530" y2="168" stroke="#0284c7" stroke-width="1" opacity="0.4" stroke-dasharray="4,3"/>
  <!-- Title -->
  <text x="450" y="360" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#7dd3fc" opacity="0.5" letter-spacing="0.15em">SUPERCONDUCTING QUBITS</text>
</svg>
