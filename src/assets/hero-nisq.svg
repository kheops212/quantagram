<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#1a0f05"/></linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="40%"><stop offset="0%" stop-color="#d97706" stop-opacity="0.3"/><stop offset="100%" stop-color="#d97706" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="14"/></filter>
    <linearGradient id="noiseFade" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#d97706" stop-opacity="1"/><stop offset="100%" stop-color="#d97706" stop-opacity="0.2"/></linearGradient>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="300" cy="197" rx="300" ry="170" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Axes -->
  <line x1="70" y1="197" x2="840" y2="197" stroke="#334155" stroke-width="1.5"/>
  <line x1="70" y1="80"  x2="70"  y2="314" stroke="#334155" stroke-width="1.5"/>
  <text x="455" y="340" text-anchor="middle" font-family="monospace" font-size="11" fill="#94a3b8">two-qubit gate count →</text>
  <text x="35"  y="197" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8" transform="rotate(-90 35 197)">circuit fidelity</text>
  <!-- Y axis labels -->
  <text x="62" y="100" text-anchor="end" font-family="monospace" font-size="9" fill="#94a3b8">1.0</text>
  <text x="62" y="197" text-anchor="end" font-family="monospace" font-size="9" fill="#94a3b8">0.5</text>
  <text x="62" y="310" text-anchor="end" font-family="monospace" font-size="9" fill="#94a3b8">0.0</text>
  <!-- X ticks -->
  <text x="200" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">50</text>
  <text x="390" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">150</text>
  <text x="580" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">250</text>
  <text x="770" y="358" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">350</text>
  <!-- Fidelity curves (F=(1-p)^G) -->
  <!-- p=0.1% (best) -->
  <polyline points="70,100 200,108 390,120 580,132 770,148" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.8"/>
  <text x="780" y="144" font-family="monospace" font-size="8.5" fill="#22c55e">p=0.1%</text>
  <!-- p=0.3% (good) -->
  <polyline points="70,100 200,126 390,158 580,194 770,233" fill="none" stroke="#d97706" stroke-width="2.5" opacity="0.9"/>
  <text x="780" y="230" font-family="monospace" font-size="8.5" fill="#d97706" font-weight="700">p=0.3%</text>
  <!-- p=0.5% (typical NISQ) -->
  <polyline points="70,100 200,146 390,196 580,246 770,294" fill="none" stroke="#f97316" stroke-width="2.5" opacity="0.8"/>
  <text x="780" y="290" font-family="monospace" font-size="8.5" fill="#f97316">p=0.5%</text>
  <!-- p=1.0% (poor) -->
  <polyline points="70,100 200,175 390,256 580,305 700,318" fill="none" stroke="#dc2626" stroke-width="2" opacity="0.7"/>
  <text x="710" y="316" font-family="monospace" font-size="8.5" fill="#dc2626">p=1.0%</text>
  <!-- Threshold line at F=0.5 -->
  <line x1="70" y1="197" x2="840" y2="197" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,3" opacity="0.4"/>
  <text x="848" y="201" font-family="monospace" font-size="8.5" fill="#94a3b8">F=0.5</text>
  <!-- Useful region shading -->
  <rect x="70" y="100" width="250" height="97" fill="#22c55e" opacity="0.05"/>
  <text x="195" y="155" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#22c55e" opacity="0.6">useful</text>
  <!-- Noise floor -->
  <text x="680" y="330" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#dc2626" opacity="0.7">noise floor</text>
  <text x="450" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#fde68a" opacity="0.45" letter-spacing="0.15em">NISQ LIMITATIONS</text>
</svg>
