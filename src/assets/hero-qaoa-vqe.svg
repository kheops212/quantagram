<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#120a2a"/></linearGradient>
    <radialGradient id="glow" cx="45%" cy="55%" r="50%"><stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="420" cy="210" rx="380" ry="165" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- 3D energy landscape (isometric grid + curved surface) -->
  <!-- Grid base lines (perspective) -->
  <g opacity="0.25" stroke="#7c3aed" stroke-width="1">
    <line x1="100" y1="340" x2="300" y2="200"/>
    <line x1="160" y1="340" x2="360" y2="200"/>
    <line x1="220" y1="340" x2="420" y2="200"/>
    <line x1="280" y1="340" x2="480" y2="200"/>
    <line x1="340" y1="340" x2="540" y2="200"/>
    <line x1="400" y1="340" x2="600" y2="200"/>
    <line x1="460" y1="340" x2="660" y2="200"/>
    <line x1="100" y1="340" x2="460" y2="340"/>
    <line x1="140" y1="320" x2="500" y2="320"/>
    <line x1="180" y1="300" x2="540" y2="300"/>
    <line x1="220" y1="280" x2="580" y2="280"/>
    <line x1="260" y1="260" x2="620" y2="260"/>
    <line x1="300" y1="240" x2="660" y2="240"/>
    <line x1="300" y1="200" x2="660" y2="200"/>
  </g>
  <!-- Energy surface bumps (flat plateau with one deep minimum) -->
  <!-- Plateau surface segments -->
  <polygon points="100,290 200,270 280,260 380,240 300,260 200,280" fill="#4c1d95" opacity="0.3"/>
  <polygon points="200,280 280,260 360,250 460,230 380,250 280,268" fill="#4c1d95" opacity="0.25"/>
  <!-- Valley/minimum -->
  <ellipse cx="330" cy="185" rx="60" ry="25" fill="#7c3aed" opacity="0.55"/>
  <ellipse cx="330" cy="188" rx="35" ry="15" fill="#a78bfa" opacity="0.6"/>
  <!-- Optimization path -->
  <path d="M 480,310 Q 420,270 380,240 Q 360,215 330,188" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="8,4" opacity="0.9"/>
  <!-- Arrow at end of path -->
  <circle cx="330" cy="188" r="6" fill="#f59e0b" opacity="0.9"/>
  <!-- Points along path -->
  <circle cx="480" cy="310" r="5" fill="#f59e0b" opacity="0.7"/>
  <circle cx="420" cy="270" r="4" fill="#f59e0b" opacity="0.75"/>
  <circle cx="380" cy="240" r="4" fill="#f59e0b" opacity="0.8"/>
  <!-- Hybrid loop label -->
  <rect x="580" y="80" width="260" height="130" rx="6" fill="#0f172a" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <text x="710" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#c4b5fd" font-weight="700">HYBRID LOOP</text>
  <text x="710" y="130" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">Quantum: ⟨H⟩(θ)</text>
  <text x="710" y="150" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">Classical: min_θ ⟨H⟩</text>
  <text x="710" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa">→ E₀ ≈ ⟨H⟩(θ*)</text>
  <text x="710" y="195" text-anchor="middle" font-family="monospace" font-size="9" fill="#7c3aed">VQE / QAOA</text>
  <!-- Global minimum label -->
  <text x="280" y="170" text-anchor="middle" font-family="monospace" font-size="10" fill="#f59e0b">E₀</text>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#c4b5fd" opacity="0.45" letter-spacing="0.15em">QAOA AND VQE</text>
</svg>
