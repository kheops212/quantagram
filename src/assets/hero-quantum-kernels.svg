<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#1a0f05"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#d97706" stop-opacity="0.28"/><stop offset="100%" stop-color="#d97706" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="197" rx="400" ry="175" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Feature space — quantum kernel separation -->
  <!-- Left label -->
  <text x="200" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8" opacity="0.7">INPUT SPACE</text>
  <!-- Tangled data (left panel) -->
  <rect x="60" y="65" width="280" height="264" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Class A (blue) — outer ring -->
  <circle cx="130" cy="140" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="190" cy="110" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="250" cy="130" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="290" cy="180" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="270" cy="240" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="200" cy="280" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="130" cy="260" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="95"  cy="200" r="6" fill="#1d4ed8" opacity="0.9"/>
  <!-- Class B (orange) — inner cluster -->
  <circle cx="175" cy="185" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="205" cy="165" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="200" cy="200" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="175" cy="220" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="225" cy="205" r="6" fill="#d97706" opacity="0.9"/>
  <!-- No separating line (tangled) -->
  <text x="200" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#dc2626" opacity="0.8">not linearly separable</text>
  <!-- Arrow -->
  <rect x="365" y="175" width="170" height="44" rx="6" fill="#0f172a" stroke="#d97706" stroke-width="1.5"/>
  <text x="450" y="193" text-anchor="middle" font-family="monospace" font-size="10" fill="#fde68a" font-weight="700">φ_Q(x)</text>
  <text x="450" y="210" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#d97706">2ⁿ-dimensional</text>
  <!-- Right label -->
  <text x="700" y="55" text-anchor="middle" font-family="monospace" font-size="10" fill="#94a3b8" opacity="0.7">QUANTUM FEATURE SPACE</text>
  <!-- Separated data (right panel) -->
  <rect x="560" y="65" width="280" height="264" rx="4" fill="#0f172a" stroke="#1e293b" stroke-width="1.5"/>
  <!-- Separating hyperplane (curved line in this 2D projection) -->
  <path d="M 575,195 Q 660,160 840,185" fill="none" stroke="#22c55e" stroke-width="2.5" opacity="0.8" stroke-dasharray="7,4"/>
  <!-- Class A — above the line -->
  <circle cx="620" cy="100" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="670" cy="120" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="730" cy="100" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="790" cy="130" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="650" cy="145" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="750" cy="145" r="6" fill="#1d4ed8" opacity="0.9"/>
  <circle cx="810" cy="115" r="6" fill="#1d4ed8" opacity="0.9"/>
  <!-- Class B — below the line -->
  <circle cx="600" cy="250" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="650" cy="270" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="710" cy="245" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="770" cy="260" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="720" cy="295" r="6" fill="#d97706" opacity="0.9"/>
  <circle cx="810" cy="250" r="6" fill="#d97706" opacity="0.9"/>
  <!-- Margin lines -->
  <text x="700" y="310" text-anchor="middle" font-family="monospace" font-size="9" fill="#22c55e" opacity="0.8">quantum kernel hyperplane</text>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#fde68a" opacity="0.45" letter-spacing="0.15em">QUANTUM KERNELS</text>
</svg>
