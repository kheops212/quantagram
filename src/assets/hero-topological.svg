<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 394" width="900" height="394">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#050c1a"/><stop offset="100%" stop-color="#0c1220"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="45%"><stop offset="0%" stop-color="#0284c7" stop-opacity="0.28"/><stop offset="100%" stop-color="#0284c7" stop-opacity="0"/></radialGradient>
    <radialGradient id="mjr" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#fde68a"/><stop offset="100%" stop-color="#d97706" stop-opacity="0"/></radialGradient>
    <filter id="gbl"><feGaussianBlur stdDeviation="10"/></filter>
  </defs>
  <rect width="900" height="394" fill="url(#bg)"/>
  <ellipse cx="450" cy="220" rx="380" ry="160" fill="url(#glow)" filter="url(#gbl)"/>
  <!-- Braid worldlines (spacetime diagram) -->
  <!-- γ₁ path: starts bottom-left, curves over γ₂ -->
  <path d="M 180,290 L 180,180 Q 180,130 320,130 Q 460,130 460,90 L 460,60" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.8"/>
  <!-- γ₂ path: starts bottom-right, goes under γ₁ (dashed where hidden) -->
  <path d="M 460,290 L 460,185" fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.8"/>
  <path d="M 460,185 Q 460,140 320,140 Q 180,140 180,100" fill="none" stroke="#7c3aed" stroke-width="3" stroke-dasharray="8,4" opacity="0.7"/>
  <path d="M 180,100 L 180,60" fill="none" stroke="#7c3aed" stroke-width="3" opacity="0.8"/>
  <!-- Start/end dots -->
  <circle cx="180" cy="290" r="7" fill="#f59e0b"/>
  <circle cx="460" cy="290" r="7" fill="#7c3aed"/>
  <circle cx="460" cy="60"  r="7" fill="#f59e0b"/>
  <circle cx="180" cy="60"  r="7" fill="#7c3aed"/>
  <!-- Axis labels -->
  <line x1="120" y1="290" x2="120" y2="60" stroke="#e5e7eb" stroke-width="1.5" opacity="0.3" marker-end="url(#arr)"/>
  <text x="100" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#9ca3af" transform="rotate(-90 100 175)">time →</text>
  <text x="180" y="318" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#f59e0b">γ₁</text>
  <text x="460" y="318" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#7c3aed">γ₂</text>
  <!-- Nanowire -->
  <rect x="550" y="180" width="260" height="34" rx="6" fill="#1e3a5f" stroke="#375a8c" stroke-width="2"/>
  <text x="680" y="201" text-anchor="middle" font-family="monospace" font-size="10" fill="#93c5fd">InAs / Al</text>
  <!-- Majorana modes -->
  <polygon points="550,163 564,180 536,180" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <polygon points="810,163 824,180 796,180" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <text x="550" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" font-weight="700">γ₁</text>
  <text x="810" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#f59e0b" font-weight="700">γ₂</text>
  <!-- Non-local label -->
  <path d="M 555,225 Q 680,248 805,225" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="680" y="262" text-anchor="middle" font-family="monospace" font-size="9" fill="#86efac" opacity="0.7">non-local parity</text>
  <text x="450" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#93c5fd" opacity="0.45" letter-spacing="0.15em">TOPOLOGICAL QUBITS</text>
</svg>
